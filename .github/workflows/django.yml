name: Django CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DB_ENV: qa
      DJANGO_DEBUG: "False"
      DJANGO_SECRET_KEY: ci-github-actions-secret-key-2026-workquest-backend-long
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,testserver
      EMAIL_PROVIDER: django
      EMAIL_NOTIFICATIONS_ENABLED: "False"
      DJANGO_EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend
      INTERNAL_SERVICE_API_KEY: ci-internal-service-key
    strategy:
      max-parallel: 4
      matrix:
        python-version: [3.9]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt
    
    - name: Run tests with coverage (80% gate on measured lines)
      run: |
        python -m coverage erase
        python -m coverage run manage.py test tests -v 2
        python -m coverage report -m
    - name: Deploy Check
      run: |
        python manage.py check --deploy
